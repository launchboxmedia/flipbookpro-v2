name: Lighthouse CI
on: [push]
jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://flipbookpro-v2.vercel.app
            https://flipbookpro-v2.vercel.app/login
          uploadArtifacts: true
          temporaryPublicStorage: true
