                - text: hree rules. The first rule is calm. When the dog steps through the door, do not greet, do not coo, do not touch — let it look. Calm is contagious; the dog reads your nervous system before it reads anything else. The second rule is consistency. The same words for the same actions, in the same tones, every time. Dogs do not learn English; they learn patterns. The third rule is sleep. A new dog needs eighteen hours of sleep a day in the first week, undisturbed and unstimulated. The single biggest cause of behaviour problems in week one is sleep deprivation. Three rules — calm, consistency, sleep — and you have already solved most of what you would have spent the next month fixing.
