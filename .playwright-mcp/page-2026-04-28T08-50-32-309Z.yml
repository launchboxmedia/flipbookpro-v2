                  - generic [ref=e262]: "Y"
                  - text: ou are not ready. That's the honest truth, and that's fine — no one ever is.
                - paragraph [ref=e263]: The moment you carry that dog through your front door, everything changes. Your home, which felt perfectly normal an hour ago, is now an overwhelming maze of smells, sounds, and strangers to a creature who had no say in any of this. Keep that in mind before you do anything else.
                - paragraph [ref=e264]: Your first instinct will be to introduce the dog to every room, every person, and every toy you bought last week. Resist it. Give the dog one room — a quiet one — and let it stand there. Let it sniff the floor, circle the space, and figure out where it is. You are not ignoring the dog by doing this. You are giving it the one thing it actually needs right now, which is time.
                - paragraph [ref=e265]: Water bowl down. Leash off. Sit nearby without hovering. If the dog approaches you, respond calmly. If it doesn't, that's also fine. First meetings between dogs and new owners are rarely the warm movie-moment people expect, and the gap between expectation and reality is where most first-day mistakes happen.
                - paragraph [ref=e266]: Keep the house quieter than usual. No parties, no sudden visitors, no children running laps through the living room. Dogs read energy before they read intention, and a chaotic first afternoon can set a nervous tone that takes days to undo.
                - paragraph [ref=e267]: Before night falls, take the dog outside on a leash — even if you have a yard. This is how it learns your routine starts here, outside, before it starts anywhere else.
                - paragraph [ref=e268]: Feed at the same time you plan to feed every day going forward. Consistency on day one isn't a nice touch — it's the actual foundation you're building on, and the next few days depend on it entirely.
